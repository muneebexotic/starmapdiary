<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Star Map Diary</title>
  <style>
    :root {
      --bg: #02030a;
      --panel: rgba(10, 14, 24, 0.72);
      --border: rgba(255, 255, 255, 0.18);
      --text: rgba(245, 248, 255, 0.92);
      --muted: rgba(220, 228, 242, 0.68);
      --button: #d9deec;
      --button-text: #0f1524;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at 20% 20%, #07122e 0%, #03050f 35%, #000 100%);
      color: var(--text);
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    }

    #app {
      position: fixed;
      inset: 0;
    }

    #ui-panel {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      width: min(92vw, 780px);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 12px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      backdrop-filter: blur(8px);
      z-index: 20;
    }

    #entry-input {
      width: 100%;
      min-height: 44px;
      max-height: 180px;
      resize: vertical;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(4, 8, 18, 0.8);
      color: var(--text);
      padding: 10px 12px;
      font-size: 14px;
      line-height: 1.4;
      outline: none;
    }

    #entry-input::placeholder {
      color: var(--muted);
    }

    #submit-btn {
      align-self: end;
      height: 44px;
      padding: 0 16px;
      border-radius: 8px;
      border: 0;
      background: var(--button);
      color: var(--button-text);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.16s ease, opacity 0.16s ease;
    }

    #submit-btn:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    #submit-btn:disabled,
    .auth-btn:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      transform: none;
    }

    #tooltip {
      position: fixed;
      pointer-events: none;
      z-index: 25;
      max-width: min(360px, 82vw);
      background: rgba(6, 10, 20, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      line-height: 1.35;
      color: var(--text);
      opacity: 0;
      transform: translate(-50%, calc(-100% - 12px));
      transition: opacity 0.12s ease;
      white-space: normal;
    }

    #modal {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      background: rgba(0, 0, 0, 0.6);
      z-index: 30;
      padding: 18px;
    }

    #modal.open {
      display: grid;
    }

    #modal-card {
      width: min(680px, 94vw);
      max-height: min(78vh, 760px);
      overflow: auto;
      background: rgba(8, 12, 22, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      padding: 16px;
    }

    #modal-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    #modal-title {
      margin: 0;
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
    }

    #close-modal {
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: transparent;
      color: var(--text);
      border-radius: 6px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 12px;
    }

    #entry-meta {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 13px;
    }

    #entry-full {
      margin: 0;
      white-space: pre-wrap;
      line-height: 1.5;
      font-size: 14px;
      color: var(--text);
    }

    #hint {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.02em;
      z-index: 12;
      text-align: center;
      pointer-events: none;
    }

    #auth-panel {
      position: fixed;
      top: 12px;
      right: 12px;
      width: min(92vw, 320px);
      display: grid;
      gap: 8px;
      padding: 10px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      backdrop-filter: blur(8px);
      z-index: 22;
    }

    #auth-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .auth-input {
      width: 100%;
      height: 34px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(4, 8, 18, 0.8);
      color: var(--text);
      padding: 0 10px;
      font-size: 12px;
      outline: none;
    }

    #auth-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .auth-btn {
      height: 30px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.92);
      color: #101828;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      padding: 0 10px;
    }

    #logout-btn {
      background: transparent;
      color: var(--text);
      border-color: rgba(255, 255, 255, 0.3);
      margin-left: auto;
    }

    #auth-status {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
    }

    @media (max-width: 640px) {
      #ui-panel {
        grid-template-columns: 1fr;
      }

      #submit-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <div id="hint">Drag to orbit • Scroll to zoom • Hover and click stars to read entries</div>

  <div id="auth-panel">
    <div id="auth-row">
      <input id="email-input" class="auth-input" type="email" autocomplete="email" placeholder="Email" />
      <input id="password-input" class="auth-input" type="password" autocomplete="current-password" placeholder="Password" />
    </div>
    <div id="auth-actions">
      <button id="signup-btn" class="auth-btn" type="button">Sign Up</button>
      <button id="login-btn" class="auth-btn" type="button">Log In</button>
      <button id="logout-btn" class="auth-btn" type="button">Log Out</button>
    </div>
    <p id="auth-status">Not signed in.</p>
  </div>

  <div id="tooltip" aria-hidden="true"></div>

  <div id="ui-panel">
    <textarea id="entry-input" maxlength="4000" placeholder="Write a journal entry and create a star..."></textarea>
    <button id="submit-btn" type="button">Add Star</button>
  </div>

  <div id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div id="modal-card">
      <div id="modal-header">
        <h2 id="modal-title">Journal Entry</h2>
        <button id="close-modal" type="button">Close</button>
      </div>
      <p id="entry-meta"></p>
      <p id="entry-full"></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script>
    (function () {
      const API_BASE = "/api";
      const AUTH_TOKEN_KEY = "star_map_diary_auth_token_v1";
      const GALAXY_RADIUS = 85;

      const SENTIMENT_CONFIG = {
        positive: {
          color: new THREE.Color("#f5c96a"),
          label: "Positive"
        },
        neutral: {
          color: new THREE.Color("#f2f4ff"),
          label: "Neutral"
        },
        negative: {
          color: new THREE.Color("#72a6ff"),
          label: "Negative"
        },
        reflective: {
          color: new THREE.Color("#8457db"),
          label: "Reflective"
        }
      };

      const sentimentLexicon = {
        positive: [
          "happy", "joy", "grateful", "great", "good", "excellent", "love", "hope", "proud", "excited", "calm", "relieved", "win", "wonderful", "smile", "success", "peaceful", "thankful", "amazing", "bright"
        ],
        negative: [
          "sad", "angry", "upset", "anxious", "afraid", "fear", "stress", "stressed", "tired", "pain", "hurt", "lonely", "fail", "failure", "bad", "worse", "worried", "depressed", "frustrated", "overwhelmed"
        ],
        reflective: [
          "think", "thought", "reflect", "realize", "realized", "learned", "lesson", "question", "meaning", "memory", "wonder", "consider", "balance", "perspective", "aware", "understand", "insight", "ponder", "journal", "noticed"
        ]
      };

      const app = document.getElementById("app");
      const tooltip = document.getElementById("tooltip");
      const input = document.getElementById("entry-input");
      const submitBtn = document.getElementById("submit-btn");
      const emailInput = document.getElementById("email-input");
      const passwordInput = document.getElementById("password-input");
      const signupBtn = document.getElementById("signup-btn");
      const loginBtn = document.getElementById("login-btn");
      const logoutBtn = document.getElementById("logout-btn");
      const authStatus = document.getElementById("auth-status");
      const modal = document.getElementById("modal");
      const closeModalBtn = document.getElementById("close-modal");
      const entryMeta = document.getElementById("entry-meta");
      const entryFull = document.getElementById("entry-full");

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1200);
      camera.position.set(0, 22, 170);

      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      app.appendChild(renderer.domElement);

      const controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.07;
      controls.minDistance = 38;
      controls.maxDistance = 360;
      controls.autoRotate = true;
      controls.autoRotateSpeed = 0.22;

      const ambient = new THREE.AmbientLight(0xffffff, 0.75);
      scene.add(ambient);

      const pointLight = new THREE.PointLight(0x9cc3ff, 0.4, 700);
      pointLight.position.set(70, 80, 80);
      scene.add(pointLight);

      const raycaster = new THREE.Raycaster();
      const pointer = new THREE.Vector2();
      let hoveredStar = null;
      let selectedStar = null;
      let authToken = localStorage.getItem(AUTH_TOKEN_KEY) || "";
      let activeUser = null;

      const diaryStars = [];
      const diaryEntries = [];
      const constellationGroup = new THREE.Group();
      scene.add(constellationGroup);

      const starTexture = createGlowTexture();
      const backgroundField = createBackgroundStarfield();
      scene.add(backgroundField);

      submitBtn.addEventListener("click", handleSubmit);
      signupBtn.addEventListener("click", handleSignup);
      loginBtn.addEventListener("click", handleLogin);
      logoutBtn.addEventListener("click", handleLogout);
      input.addEventListener("keydown", function (event) {
        if ((event.metaKey || event.ctrlKey) && event.key === "Enter") {
          handleSubmit();
        }
      });

      window.addEventListener("pointermove", onPointerMove);
      window.addEventListener("pointerdown", onPointerDown);
      window.addEventListener("resize", onResize);

      closeModalBtn.addEventListener("click", closeModal);
      modal.addEventListener("click", function (event) {
        if (event.target === modal) {
          closeModal();
        }
      });

      animate();
      bootstrap();

      function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }

      function onPointerMove(event) {
        pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
        pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;

        if (hoveredStar) {
          const text = hoveredStar.userData.entry.text;
          const preview = text.length > 80 ? text.slice(0, 80) + "..." : text;
          tooltip.innerHTML = "<strong>" + escapeHtml(preview) + "</strong><br>" + formatDate(hoveredStar.userData.entry.createdAt);
          tooltip.style.left = event.clientX + "px";
          tooltip.style.top = event.clientY + "px";
        }
      }

      function onPointerDown(event) {
        pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
        pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(pointer, camera);

        const intersects = raycaster.intersectObjects(diaryStars, false);
        if (intersects.length > 0) {
          selectedStar = intersects[0].object;
          openModalForStar(selectedStar);
        }
      }

      async function bootstrap() {
        setSignedInState(false);
        if (!authToken) return;

        try {
          const me = await apiRequest("GET", "/auth/me");
          activeUser = me;
          setSignedInState(true);
          await loadEntriesFromServer();
        } catch (_err) {
          clearAuth();
          setStatus("Session expired. Please log in.");
        }
      }

      async function handleSignup() {
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        if (!email || !password) {
          setStatus("Email and password are required.");
          return;
        }

        try {
          const response = await apiRequest("POST", "/auth/signup", { email: email, password: password }, false);
          if (!response.session || !response.session.access_token) {
            setStatus("Signup succeeded. Check email confirmation before login.");
            return;
          }
          authToken = response.session.access_token;
          localStorage.setItem(AUTH_TOKEN_KEY, authToken);
          activeUser = response.user || null;
          setSignedInState(true);
          await loadEntriesFromServer();
          setStatus("Signed up and logged in.");
        } catch (err) {
          setStatus(err.message);
        }
      }

      async function handleLogin() {
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        if (!email || !password) {
          setStatus("Email and password are required.");
          return;
        }

        try {
          const response = await apiRequest("POST", "/auth/login", { email: email, password: password }, false);
          authToken = response.session.access_token;
          localStorage.setItem(AUTH_TOKEN_KEY, authToken);
          activeUser = response.user || null;
          setSignedInState(true);
          await loadEntriesFromServer();
          setStatus("Logged in.");
        } catch (err) {
          setStatus(err.message);
        }
      }

      function handleLogout() {
        clearAuth();
        clearAllDiaryObjects();
        setSignedInState(false);
        setStatus("Logged out.");
      }

      function clearAuth() {
        authToken = "";
        activeUser = null;
        localStorage.removeItem(AUTH_TOKEN_KEY);
      }

      async function loadEntriesFromServer() {
        const data = await apiRequest("GET", "/entries");
        clearAllDiaryObjects();
        for (let i = 0; i < data.entries.length; i += 1) {
          const entry = data.entries[i];
          if (!entry.position || typeof entry.position.x !== "number") {
            entry.position = randomPositionInGalaxy(entry.sentiment, entry.createdAt);
          }
          diaryEntries.push(entry);
          createDiaryStar(entry);
        }
      }

      function clearAllDiaryObjects() {
        hoveredStar = null;
        selectedStar = null;
        tooltip.style.opacity = "0";

        while (diaryStars.length > 0) {
          const star = diaryStars.pop();
          scene.remove(star);
          if (star.material && star.material.dispose) {
            star.material.dispose();
          }
        }

        while (constellationGroup.children.length > 0) {
          const line = constellationGroup.children[0];
          constellationGroup.remove(line);
          if (line.geometry) line.geometry.dispose();
          if (line.material) line.material.dispose();
        }

        diaryEntries.length = 0;
      }

      function setSignedInState(signedIn) {
        submitBtn.disabled = !signedIn;
        input.disabled = !signedIn;
        emailInput.disabled = signedIn;
        passwordInput.disabled = signedIn;
        signupBtn.disabled = signedIn;
        loginBtn.disabled = signedIn;
        logoutBtn.disabled = !signedIn;

        if (signedIn && activeUser) {
          setStatus("Signed in as " + activeUser.email);
        } else if (!signedIn) {
          setStatus("Not signed in.");
        }
      }

      function setStatus(message) {
        authStatus.textContent = message;
      }

      async function apiRequest(method, path, body, withAuth) {
        const needsAuth = withAuth !== false;
        const headers = { "Content-Type": "application/json" };
        if (needsAuth) {
          if (!authToken) throw new Error("Please log in to continue.");
          headers.Authorization = "Bearer " + authToken;
        }

        const response = await fetch(API_BASE + path, {
          method: method,
          headers: headers,
          body: body ? JSON.stringify(body) : undefined
        });
        const payload = await response.json().catch(function () { return {}; });
        if (!response.ok) {
          throw new Error(payload.error || "Request failed.");
        }
        return payload;
      }

      async function handleSubmit() {
        if (!authToken) {
          setStatus("Please log in first.");
          return;
        }

        const text = input.value.trim();
        if (!text) {
          return;
        }

        const sentiment = classifySentiment(text);
        const entry = {
          text: text,
          sentiment: sentiment,
          createdAt: new Date().toISOString()
        };
        entry.position = randomPositionInGalaxy(entry.sentiment, entry.createdAt);

        try {
          const response = await apiRequest("POST", "/entries", entry);
          const saved = response.entry;
          diaryEntries.push(saved);
          createDiaryStar(saved);
          setStatus("Entry saved.");
          input.value = "";
        } catch (err) {
          setStatus(err.message);
        }
      }

      function classifySentiment(text) {
        const normalized = text.toLowerCase();
        const tokens = normalized.match(/[a-z']+/g) || [];

        const counts = {
          positive: 0,
          neutral: 0,
          negative: 0,
          reflective: 0
        };

        for (const token of tokens) {
          if (sentimentLexicon.positive.includes(token)) counts.positive += 1;
          if (sentimentLexicon.negative.includes(token)) counts.negative += 1;
          if (sentimentLexicon.reflective.includes(token)) counts.reflective += 1;
        }

        const qMarks = (normalized.match(/\?/g) || []).length;
        if (qMarks > 1) {
          counts.reflective += 1;
        }

        const maxScore = Math.max(counts.positive, counts.negative, counts.reflective);
        if (maxScore === 0) {
          return "neutral";
        }

        if (counts.reflective === maxScore && counts.reflective >= 2) {
          return "reflective";
        }

        if (counts.positive === maxScore && counts.positive > counts.negative) {
          return "positive";
        }

        if (counts.negative === maxScore && counts.negative > counts.positive) {
          return "negative";
        }

        if (counts.reflective === maxScore) {
          return "reflective";
        }

        return "neutral";
      }

      function createDiaryStar(entry) {
        const cfg = SENTIMENT_CONFIG[entry.sentiment];
        const lenFactor = Math.min(entry.text.length, 800);
        const size = THREE.MathUtils.mapLinear(lenFactor, 1, 800, 5, 20);

        const material = new THREE.SpriteMaterial({
          map: starTexture,
          color: cfg.color,
          transparent: true,
          blending: THREE.AdditiveBlending,
          depthWrite: false
        });

        const star = new THREE.Sprite(material);
        star.position.set(entry.position.x, entry.position.y, entry.position.z);
        star.scale.setScalar(size);

        star.userData = {
          entry: entry,
          baseScale: size,
          pulseOffset: Math.random() * Math.PI * 2
        };

        diaryStars.push(star);
        scene.add(star);
        addConstellationLinks(star);
      }

      function createGlowTexture() {
        const canvas = document.createElement("canvas");
        canvas.width = 256;
        canvas.height = 256;
        const ctx = canvas.getContext("2d");

        const gradient = ctx.createRadialGradient(128, 128, 4, 128, 128, 128);
        gradient.addColorStop(0, "rgba(255, 255, 255, 1)");
        gradient.addColorStop(0.15, "rgba(255, 255, 255, 0.95)");
        gradient.addColorStop(0.45, "rgba(255, 255, 255, 0.3)");
        gradient.addColorStop(1, "rgba(255, 255, 255, 0)");

        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, 256, 256);

        const texture = new THREE.CanvasTexture(canvas);
        texture.needsUpdate = true;
        return texture;
      }

      function createBackgroundStarfield() {
        const count = 1800;
        const positions = new Float32Array(count * 3);
        const colors = new Float32Array(count * 3);

        for (let i = 0; i < count; i += 1) {
          const radius = 340 + Math.random() * 520;
          const theta = Math.random() * Math.PI * 2;
          const phi = Math.acos(2 * Math.random() - 1);

          const x = radius * Math.sin(phi) * Math.cos(theta);
          const y = radius * Math.cos(phi);
          const z = radius * Math.sin(phi) * Math.sin(theta);

          const idx = i * 3;
          positions[idx] = x;
          positions[idx + 1] = y;
          positions[idx + 2] = z;

          const tone = 0.6 + Math.random() * 0.4;
          colors[idx] = tone;
          colors[idx + 1] = tone;
          colors[idx + 2] = tone + Math.random() * 0.08;
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute("color", new THREE.BufferAttribute(colors, 3));

        const material = new THREE.PointsMaterial({
          size: 1.55,
          vertexColors: true,
          transparent: true,
          opacity: 0.68,
          depthWrite: false,
          blending: THREE.AdditiveBlending
        });

        return new THREE.Points(geometry, material);
      }

      function updateHoverState() {
        raycaster.setFromCamera(pointer, camera);
        const intersects = raycaster.intersectObjects(diaryStars, false);

        if (intersects.length > 0) {
          hoveredStar = intersects[0].object;
          tooltip.style.opacity = "1";
          tooltip.setAttribute("aria-hidden", "false");
          document.body.style.cursor = "pointer";
        } else {
          hoveredStar = null;
          tooltip.style.opacity = "0";
          tooltip.setAttribute("aria-hidden", "true");
          document.body.style.cursor = "default";
        }
      }

      function addConstellationLinks(newStar) {
        const sentiment = newStar.userData.entry.sentiment;
        const candidates = [];

        for (let i = 0; i < diaryStars.length; i += 1) {
          const other = diaryStars[i];
          if (other === newStar) continue;
          if (other.userData.entry.sentiment !== sentiment) continue;
          candidates.push(other);
        }

        if (candidates.length === 0) return;

        candidates.sort(function (a, b) {
          return newStar.position.distanceToSquared(a.position) - newStar.position.distanceToSquared(b.position);
        });

        const cfg = SENTIMENT_CONFIG[sentiment];
        const linkCount = Math.min(2, candidates.length);

        for (let i = 0; i < linkCount; i += 1) {
          const target = candidates[i];
          const points = [newStar.position.clone(), target.position.clone()];
          const geometry = new THREE.BufferGeometry().setFromPoints(points);
          const material = new THREE.LineBasicMaterial({
            color: cfg.color,
            transparent: true,
            opacity: 0.11,
            depthWrite: false
          });
          const line = new THREE.Line(geometry, material);
          constellationGroup.add(line);
        }
      }

      function animate() {
        requestAnimationFrame(animate);

        const t = performance.now() * 0.001;

        backgroundField.rotation.y += 0.00018;
        backgroundField.rotation.x = Math.sin(t * 0.03) * 0.02;

        for (let i = 0; i < diaryStars.length; i += 1) {
          const star = diaryStars[i];
          const pulse = 1 + Math.sin(t * 1.5 + star.userData.pulseOffset) * 0.08;
          star.scale.setScalar(star.userData.baseScale * pulse);
        }

        updateHoverState();
        controls.update();
        renderer.render(scene, camera);
      }

      function openModalForStar(star) {
        const entry = star.userData.entry;
        entryMeta.textContent = SENTIMENT_CONFIG[entry.sentiment].label + " • " + formatDate(entry.createdAt);
        entryFull.textContent = entry.text;
        modal.classList.add("open");
      }

      function closeModal() {
        modal.classList.remove("open");
      }

      function randomPositionInGalaxy(sentiment, createdAt) {
        const zoneCenters = {
          positive: new THREE.Vector3(60, 40, 0),
          negative: new THREE.Vector3(-60, -40, 0),
          reflective: new THREE.Vector3(-50, 40, 0),
          neutral: new THREE.Vector3(0, 0, 0)
        };

        const zoneCenter = zoneCenters[sentiment] || zoneCenters.neutral;
        const zoneRadius = sentiment === "neutral" ? 82 : 95;

        const r = Math.cbrt(Math.random()) * zoneRadius;
        const theta = Math.random() * Math.PI * 2;
        const v = Math.random() * 2 - 1;
        const m = Math.sqrt(1 - v * v);

        const spawn = new THREE.Vector3(
          zoneCenter.x + r * m * Math.cos(theta),
          zoneCenter.y + r * v,
          zoneCenter.z + r * m * Math.sin(theta)
        );

        const createdTs = new Date(createdAt || Date.now()).getTime();
        let oldestTs = createdTs;
        let newestTs = createdTs;

        for (let i = 0; i < diaryEntries.length; i += 1) {
          const ts = new Date(diaryEntries[i] && diaryEntries[i].createdAt).getTime();
          if (!Number.isFinite(ts)) continue;
          if (ts < oldestTs) oldestTs = ts;
          if (ts > newestTs) newestTs = ts;
        }

        let timelineT = 0.5;
        if (newestTs > oldestTs) {
          timelineT = (createdTs - oldestTs) / (newestTs - oldestTs);
          timelineT = THREE.MathUtils.clamp(timelineT, 0, 1);
        }

        const zTimelineOffset = THREE.MathUtils.lerp(-45, 45, timelineT);
        spawn.z += zTimelineOffset;

        return {
          x: spawn.x,
          y: spawn.y,
          z: spawn.z
        };
      }

      function formatDate(iso) {
        const date = new Date(iso);
        return date.toLocaleString(undefined, {
          year: "numeric",
          month: "short",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit"
        });
      }

      function escapeHtml(str) {
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }
    })();
  </script>
